services:

  # ── MongoDB ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: smart_travel_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - smart_travel_net

  # ── Backend (Node.js / Express) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_travel_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/smart_travel_planner
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    networks:
      - smart_travel_net

  # ── Frontend (Nginx static server) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_travel_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smart_travel_net

volumes:
  mongo_data:
    driver: local

networks:
  smart_travel_net:
    driver: bridge
