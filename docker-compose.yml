services:

  # ── MongoDB ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: smart_travel_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - smart_travel_net

  # ── Backend (Node.js / Express) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_travel_backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - DOCKERIZED=true
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/smart_travel_planner
      - DB_CONNECT_RETRIES=15
      - DB_CONNECT_RETRY_DELAY_MS=3000
    env_file:
      - ./backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - smart_travel_net

  # ── Frontend (Nginx static server) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_travel_frontend
    restart: unless-stopped
    ports:
      - "5000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - smart_travel_net

volumes:
  mongo_data:
    driver: local

networks:
  smart_travel_net:
    driver: bridge
