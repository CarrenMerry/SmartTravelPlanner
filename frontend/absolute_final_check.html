<!DOCTYPE html>
<html>
<head>
    <title>Absolute Final Check</title>
    <style>
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 5px; text-align: center; }
        img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        h4 { margin: 5px 0; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Absolute Final Image Check (18 Assets)</h1>
    <div id="gallery" class="grid"></div>

    <script src="js/destination-data.js"></script>
    <script>
        const container = document.getElementById('gallery');
        Object.keys(destinationsData).forEach(destKey => {
            const dest = destinationsData[destKey];
            
            // Hero
            addImg(dest.image, destKey + " Hero");
            
            // Hotels
            dest.hotels.forEach(h => addImg(h.image, destKey + " - " + h.name));
            
            // Activities
            dest.activities.forEach(a => addImg(a.image, destKey + " - " + a.name));
        });

        function addImg(src, label) {
            const div = document.createElement('div');
            div.className = 'box';
            div.innerHTML = `<h4>${label}</h4><img src="${src}" onerror="this.style.border='5px solid red'">`;
            container.appendChild(div);
        }
    </script>
</body>
</html>
