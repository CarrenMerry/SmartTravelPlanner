<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Results | Smart Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .result-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .result-card:hover { transform: translateY(-10px); background: rgba(15, 23, 42, 0.7); border-color: #00d2ff; }
        .highlight { box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); border-color: rgba(0,210,255,0.5); background: rgba(15, 23, 42, 0.6); }

        /* Attraction Card Styles */
        .attraction-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            height: 100%;
            display: flex;
            flex-direction: column;
            color: #fff;
        }
        .attraction-card:hover { 
            transform: translateY(-10px); 
            background: rgba(15, 23, 42, 0.7); 
            border-color: #00d2ff;
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2);
        }
        .attraction-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .attraction-content {
            padding: 20px;
            flex-grow: 1;
        }
    </style>
</head>
<body class="text-white">
    <div id="bg-img" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-2; background-size: cover; background-position: center; transition: background 1s ease;"></div>
    <div class="bg-overlay" style="z-index:-1; background: linear-gradient(to bottom, rgba(15,23,42,0.95), rgba(15,23,42,0.6));"></div>
    
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top glass-navbar bg-transparent border-0">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand fw-bold text-white fs-4" href="index.html">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="me-2 mb-1" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22l10-4 10 4L12 2z"/></svg>
                SmartTravel
            </a>
            <div class="currency-toolbar ms-auto">
                <div data-currency-mount></div>
                <span class="text-white me-3 d-none d-lg-block" id="navUserName">Hello, User</span>
                <div class="avatar-circle">
                    <img src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff" alt="User" class="img-fluid rounded-circle" id="navUserAvatar">
                </div>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 130px; padding-bottom: 80px;">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold title" id="res-title">Your Custom Itineraries</h1>
            <p class="fs-5 text-light opacity-75 subtitle" id="res-subtitle">Curated based on your specific requirements</p>
        </div>
        
        <div class="row g-4 justify-content-center" id="results-container">
            <!-- Cards injected here via JS -->
            <div class="text-center w-100 my-5"><span class="spinner-border text-info"></span></div>
        </div>

        <!-- Attraction Fallback Section -->
        <div id="attractions-section" class="d-none mt-5">
            <div class="text-center mb-5">
                <h2 class="display-5 fw-bold">Popular Attractions</h2>
                <p class="fs-5 text-info opacity-75">Showing popular attractions for this destination</p>
            </div>
            <div class="row g-4 justify-content-center" id="attractions-container"></div>
        </div>
        
        <div class="text-center mt-5 pt-3">
            <a href="plan.html" class="btn btn-outline-light rounded-pill px-4 py-2 me-3">Refine Preferences</a>
            <a href="index.html" class="btn btn-link text-white text-decoration-none">Back to Home</a>
        </div>
    </div>

    <script src="utils/currency.js"></script>
    <script src="js/results.js"></script>
    </body>
</html>
