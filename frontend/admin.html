<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Smart Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-dark text-white py-5">
    <nav class="navbar navbar-expand-lg fixed-top glass-navbar bg-dark" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand fw-bold text-white fs-4" href="index.html">SmartTravel <span class="text-info fs-6 ms-2 pb-1">ADMIN</span></a>
        </div>
    </nav>

    <div class="container mt-5 pt-4">
        <h2 class="mb-4 text-center fw-bold">Data Entry Dashboard</h2>
        
        <div class="row g-4">
            <!-- Add Destination -->
            <div class="col-md-6">
                <div class="card bg-secondary text-white border-0 shadow" style="background: rgba(255,255,255,0.05) !important;">
                    <div class="card-body p-4">
                        <h4 class="card-title text-info mb-4">Add Destination</h4>
                        <form id="destForm">
                            <input type="text" id="d_name" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Location Name (e.g. Nusa Penida)" required>
                            <input type="text" id="d_country" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Country" required>
                            <textarea id="d_desc" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Description" required></textarea>
                            <input type="url" id="d_img" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Image URL (Unsplash)" required>
                            <button type="submit" class="btn btn-info w-100 fw-bold">Add Destination</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Add Hotel -->
            <div class="col-md-6">
                <div class="card bg-secondary text-white border-0 shadow" style="background: rgba(255,255,255,0.05) !important;">
                    <div class="card-body p-4">
                        <h4 class="card-title text-info mb-4">Add Hotel</h4>
                        <form id="hotelForm">
                            <input type="text" id="h_dest" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Destination MongoDB Object ID" required>
                            <input type="text" id="h_name" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Hotel Name" required>
                            <input type="number" id="h_price" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Price Per Day ($)" required>
                            <select id="h_type" class="form-control mb-3 bg-dark text-white border-dark">
                                <option value="budget">Budget</option>
                                <option value="standard">Standard</option>
                                <option value="luxury">Luxury</option>
                            </select>
                            <button type="submit" class="btn btn-info w-100 fw-bold">Add Hotel</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Add Activity -->
            <div class="col-md-6">
                <div class="card bg-secondary text-white border-0 shadow" style="background: rgba(255,255,255,0.05) !important;">
                    <div class="card-body p-4">
                        <h4 class="card-title text-info mb-4">Add Activity</h4>
                        <form id="actForm">
                            <input type="text" id="a_dest" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Destination MongoDB Object ID" required>
                            <input type="text" id="a_name" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Activity Name" required>
                            <input type="number" id="a_price" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Price ($)" required>
                            <select id="a_type" class="form-control mb-3 bg-dark text-white border-dark">
                                <option value="adventure">Adventure</option>
                                <option value="relaxation">Relaxation</option>
                                <option value="cultural">Cultural</option>
                            </select>
                            <button type="submit" class="btn btn-info w-100 fw-bold">Add Activity</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Add Transport -->
            <div class="col-md-6">
                <div class="card bg-secondary text-white border-0 shadow" style="background: rgba(255,255,255,0.05) !important;">
                    <div class="card-body p-4">
                        <h4 class="card-title text-info mb-4">Add Transport</h4>
                        <form id="transForm">
                            <input type="text" id="t_dest" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Destination MongoDB Object ID" required>
                            <input type="text" id="t_type" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Type (Flight/Train/Bus/Transfer)" required>
                            <input type="number" id="t_price" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Price ($)" required>
                            <input type="text" id="t_contact" class="form-control mb-3 bg-dark text-white border-dark" placeholder="Contact/Airline" required>
                            <button type="submit" class="btn btn-info w-100 fw-bold">Add Transport</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const handleSubmit = async (e, endpoint, payloadFn) => {
            e.preventDefault();
            try {
                const res = await fetch(`/api/admin/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payloadFn())
                });
                const data = await res.json();
                if (res.ok) {
                    alert(data.message);
                    e.target.reset();
                } else alert(data.error);
            } catch (err) {
                alert('API Error. Make sure backend is running.');
            }
        };

        document.getElementById('destForm').addEventListener('submit', e => handleSubmit(e, 'destination', () => ({
            name: document.getElementById('d_name').value,
            country: document.getElementById('d_country').value,
            description: document.getElementById('d_desc').value,
            image: document.getElementById('d_img').value
        })));

        document.getElementById('hotelForm').addEventListener('submit', e => handleSubmit(e, 'hotel', () => ({
            destination: document.getElementById('h_dest').value,
            name: document.getElementById('h_name').value,
            price_per_day: document.getElementById('h_price').value,
            type: document.getElementById('h_type').value
        })));

        document.getElementById('actForm').addEventListener('submit', e => handleSubmit(e, 'activity', () => ({
            destination: document.getElementById('a_dest').value,
            name: document.getElementById('a_name').value,
            price: document.getElementById('a_price').value,
            type: document.getElementById('a_type').value
        })));

        document.getElementById('transForm').addEventListener('submit', e => handleSubmit(e, 'transport', () => ({
            destination: document.getElementById('t_dest').value,
            type: document.getElementById('t_type').value,
            price: document.getElementById('t_price').value,
            contact: document.getElementById('t_contact').value
        })));
    </script>
</body>
</html>
