<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Travel Planner</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95) 0%, rgba(15, 23, 42, 0.8) 100%), url('https://images.unsplash.com/photo-1537996194471-e657df975ab4?auto=format&fit=crop&q=80&w=2000') no-repeat center center/cover;
            padding: 2rem;
        }

        .glass-auth-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUpFade 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .auth-title {
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #fff;
            text-align: center;
        }

        .auth-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .auth-link {
            color: #00d2ff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .auth-link:hover {
            color: #fff;
        }

        .logo-top {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="notification-container" id="notificationContainer"></div>

    <div class="auth-page position-relative">
        <!-- Back Button -->
        <a href="javascript:history.back()" aria-label="Go Back" class="floating-back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <div class="glass-auth-card">
            <div class="logo-top">
                <a href="index.html" class="text-white fw-bold d-flex align-items-center text-decoration-none fs-4">
                    <span class="logo-icon bg-white text-dark rounded-circle me-2 d-flex justify-content-center align-items-center" style="width:40px; height:40px;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 22l10-4 10 4 10-20-20 0z" />
                        </svg>
                    </span>
                    SmartTravel
                </a>
            </div>
            
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Log in to continue planning your premium trips.</p>

            <form id="loginForm">
                <div class="mb-4">
                    <input type="email" id="logEmail" class="glass-input" placeholder="Email Address" required>
                </div>
                <div class="mb-4">
                    <input type="password" id="logPassword" class="glass-input" placeholder="Password" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe" style="background-color: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2);">
                        <label class="form-check-label text-white-50 fs-6" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="#" class="auth-link fs-6">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-explore w-100 justify-content-center border-0 mb-4" style="padding: 14px;">Sign In</button>
                
                <p class="text-center text-white-50 mb-0">
                    Don't have an account? <a href="register.html" class="auth-link">Register Here</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        function showNotification(message, type = 'error') {
            const container = document.getElementById('notificationContainer');
            const toast = document.createElement('div');
            toast.className = `notification-toast ${type}`;
            toast.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    ${type === 'error' 
                        ? '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>' 
                        : '<polyline points="20 6 9 17 4 12"/>'}
                </svg>
                <span>${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px) scale(0.95)';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        function validateEmail(email) {
            return String(email)
                .toLowerCase()
                .match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('logEmail').value.trim().toLowerCase();
            const password = document.getElementById('logPassword').value.trim();

            if (!validateEmail(email)) {
                showNotification("Please enter a valid email address.");
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showNotification("Login successful! Welcome back.", "success");
                    localStorage.setItem('user', JSON.stringify(data.user));
                    setTimeout(() => window.location.href = 'index.html', 1000);
                } else {
                    showNotification(data.error || "Login failed. Please check your credentials.");
                }
            } catch (err) {
                console.error(err);
                showNotification("Unable to connect to the server.");
            }
        });
    </script>
</body>
</html>
