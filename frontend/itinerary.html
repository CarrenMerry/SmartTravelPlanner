<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Itinerary | Smart Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .itinerary-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            color: #fff;
            margin-bottom: 30px;
        }
        .day-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        .day-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 210, 255, 0.3);
        }
        .activity-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        body {
            transition: opacity 0.5s ease-in;
            opacity: 0;
            background-color: #0f172a;
            transition: opacity 0.5s ease-in;
        }
        body.loaded {
            opacity: 1;
        }
        .cost-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 0;
        }
        .cost-item:last-child {
            border-bottom: none;
        }
        .fade-out {
            opacity: 0 !important;
        }
        #main-content {
            position: relative;
            z-index: 10;
        }
        #itinerary-container {
            display: block !important;
            opacity: 1 !important;
            z-index: 10;
            position: relative;
        }
        
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(15,23,42,0.9); }
        ::-webkit-scrollbar-thumb { background: rgba(0,210,255,0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,210,255,0.8); }
    </style>
</head>
<body class="text-white">
    <div id="bg-img" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-2; background-size: cover; background-position: center; transition: background 1s ease;"></div>
    <div class="bg-overlay" style="position:fixed; top:0; left:0; width: 100vw; height: 100vh; z-index:-1; background: linear-gradient(to bottom, rgba(15,23,42,0.95), rgba(15,23,42,0.7));"></div>
    
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top glass-navbar bg-transparent border-0">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand fw-bold text-white fs-4" href="index.html">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="me-2 mb-1" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22l10-4 10 4L12 2z"/></svg>
                SmartTravel
            </a>
            <div class="currency-toolbar ms-auto">
                <div data-currency-mount></div>
                <span class="text-white me-3 d-none d-lg-block" id="navUserName">Hello, User</span>
                <div class="avatar-circle me-3">
                    <img src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff" alt="User" class="img-fluid rounded-circle" id="navUserAvatar">
                </div>
                <button onclick="goBack()" class="btn btn-outline-light rounded-pill px-4 py-2 me-3 d-flex align-items-center">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="me-2"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Back to Results
                </button>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 130px; padding-bottom: 80px;" id="main-content">
        <div id="itinerary-container">
            <div class="text-center w-100 my-5"><span class="spinner-border text-info" style="width: 3rem; height: 3rem;"></span></div>
        </div>
    </div>

    <script src="utils/currency.js"></script>
    <script src="js/itinerary.js"></script>
    <script>
        // Fade in effect
        document.addEventListener('DOMContentLoaded', () => {
             setTimeout(() => {
                document.body.classList.add('loaded');
            }, 50);
        });

        // Smooth back navigation
        function goBack() {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = "results.html";
            }, 500);
        }
    </script>
</body>
</html>
