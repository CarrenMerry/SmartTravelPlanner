<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Blog | Smart Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=1.1">
    <style>
        .blog-hero {
            min-height: 78vh;
            position: relative;
            display: flex;
            align-items: end;
            overflow: hidden;
            padding: 110px 0 90px;
        }

        .blog-hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transform: scale(1.08);
            filter: brightness(0.45);
            transition: transform 6s linear;
            z-index: -2;
        }

        .blog-hero-bg.active {
            transform: scale(1);
        }

        .blog-hero-overlay {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(6, 12, 28, 0.25) 0%, rgba(6, 12, 28, 0.75) 65%, #0f172a 100%),
                linear-gradient(105deg, rgba(0, 0, 0, 0.78) 0%, rgba(0, 0, 0, 0.42) 45%, rgba(0, 0, 0, 0.12) 100%);
            z-index: -1;
        }

        .blog-category-chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 999px;
            padding: 10px 18px;
            font-size: 0.9rem;
            margin-bottom: 0;
        }

        .blog-category-chip span {
            color: #00d2ff;
            font-weight: 600;
        }

        .blog-hero-topline {
            display: flex;
            align-items: baseline;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .blog-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 28px;
        }

        .blog-meta-pill {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            padding: 10px 16px;
            color: rgba(255, 255, 255, 0.86);
            font-size: 0.92rem;
        }

        .blog-shell {
            margin-top: -60px;
            position: relative;
            z-index: 2;
        }

        .article-panel,
        .sidebar-panel,
        .tips-panel,
        .cta-panel {
            background: rgba(15, 23, 42, 0.52);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.24);
        }

        .article-panel {
            padding: 42px;
        }

        .article-intro {
            font-size: 1.14rem;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.88);
        }

        .article-content h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 38px 0 14px;
            color: #fff;
        }

        .article-content p {
            font-size: 1rem;
            line-height: 1.95;
            color: rgba(255, 255, 255, 0.78);
            margin-bottom: 18px;
        }

        .inline-media {
            margin: 34px 0;
        }

        .inline-media img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
        }

        .inline-caption {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.52);
            margin-top: 10px;
        }

        .sidebar-panel,
        .tips-panel,
        .cta-panel {
            padding: 28px;
        }

        .info-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 1.08rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 18px;
        }

        .tips-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 12px;
        }

        .tips-list li {
            display: flex;
            gap: 12px;
            align-items: start;
            color: rgba(255, 255, 255, 0.78);
            line-height: 1.7;
        }

        .tips-list li::before {
            content: '';
            width: 10px;
            height: 10px;
            margin-top: 9px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0284c7, #00d2ff);
            box-shadow: 0 0 12px rgba(0, 210, 255, 0.45);
            flex: 0 0 10px;
        }

        .back-to-blogs {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.82);
            text-decoration: none;
            margin-bottom: 0;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .back-to-blogs:hover {
            color: #fff;
            transform: translateX(-4px);
        }

        .section-fade-load {
            opacity: 0;
            transform: translateY(36px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .section-fade-load.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 991px) {
            .blog-hero {
                min-height: 70vh;
                padding-top: 120px;
            }

            .blog-shell {
                margin-top: -30px;
            }

            .article-panel {
                padding: 30px 24px;
            }

            .inline-media img {
                height: 240px;
            }
        }

        @media (max-width: 576px) {
            .blog-meta-row {
                gap: 10px;
            }

            .blog-meta-pill {
                font-size: 0.84rem;
                padding: 8px 12px;
            }
        }
    </style>
</head>

<body>
    <header class="blog-hero">
        <div id="blog-hero-bg" class="blog-hero-bg"></div>
        <div class="blog-hero-overlay"></div>
        <div class="container px-4 px-lg-5">
            <div class="row">
                <div class="col-lg-9 section-fade-load">
                    <div class="blog-hero-topline">
                        <a href="index.html#blog" class="back-to-blogs">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 12H5M12 19l-7-7 7-7" />
                            </svg>
                            Back to Blogs
                        </a>
                        <div class="blog-category-chip">Feature Story <span id="blog-destination-chip">...</span></div>
                    </div>
                    <h1 id="blog-title" class="hero-title" style="font-size: clamp(3rem, 7vw, 6rem);">...</h1>
                    <p id="blog-subtitle" class="hero-subtitle" style="max-width: 760px;">...</p>
                    <div class="blog-meta-row">
                        <div class="blog-meta-pill" id="blog-read-time">...</div>
                        <div class="blog-meta-pill" id="blog-category">...</div>
                        <div class="blog-meta-pill" id="blog-destination">...</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="blog-shell pb-5">
        <div class="container px-4 px-lg-5">
            <div class="row g-4">
                <div class="col-lg-8">
                    <article class="article-panel section-fade-load">
                        <div class="article-intro mb-4" id="blog-intro"></div>
                        <div id="blog-content" class="article-content"></div>
                    </article>
                </div>
                <div class="col-lg-4">
                    <div class="sidebar-panel section-fade-load mb-4">
                        <div class="info-label">Destination</div>
                        <div class="info-value" id="sidebar-destination">...</div>
                        <div class="info-label">Mood</div>
                        <div class="info-value" id="sidebar-mood">...</div>
                        <div class="info-label">Best For</div>
                        <div class="info-value mb-0" id="sidebar-best-for">...</div>
                    </div>

                    <div class="tips-panel section-fade-load mb-4">
                        <h3 class="fs-4 fw-bold mb-3">Quick Tips</h3>
                        <ul class="tips-list" id="blog-tips"></ul>
                    </div>

                    <div class="cta-panel section-fade-load">
                        <h3 class="fs-3 fw-bold mb-3">Ready to Turn Inspiration Into a Trip?</h3>
                        <p class="text-white-50 mb-4">Use this story as your starting point and let SmartTravel build the itinerary.</p>
                        <a id="plan-trip-btn" href="#" class="btn-explore w-100 justify-content-center">Plan a Trip Like This</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/blog-detail.js"></script>
</body>

</html>
