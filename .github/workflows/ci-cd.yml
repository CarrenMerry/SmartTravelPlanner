name: Smart Travel CI/CD

on:
  push:
    branches:
      - main

jobs:
  # Stage 1A: Frontend unit tests
  # Runs in parallel with backend-test because neither job depends on the other.
  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect frontend Node project
        id: frontend-files
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then
            echo "has_package=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f frontend/package-lock.json ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js with cache
        if: ${{ steps.frontend-files.outputs.has_lockfile == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Node.js
        if: ${{ steps.frontend-files.outputs.has_lockfile != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        if: ${{ steps.frontend-files.outputs.has_package == 'true' }}
        working-directory: frontend
        run: npm install

      - name: Run frontend tests
        if: ${{ steps.frontend-files.outputs.has_package == 'true' }}
        working-directory: frontend
        run: npm test || echo "No frontend tests"

      - name: Skip frontend tests
        if: ${{ steps.frontend-files.outputs.has_package != 'true' }}
        run: echo "No frontend/package.json found. Skipping frontend npm tests."

  # Stage 1B: Backend unit tests
  # Runs in parallel with frontend-test.
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Detect backend test script
        id: backend-tests
        shell: bash
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && typeof pkg.scripts.test === 'string' && pkg.scripts.test.trim() ? 0 : 1)"; then
            echo "has_test_script=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_test_script=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install backend dependencies
        run: npm install

      - name: Run backend tests
        if: ${{ steps.backend-tests.outputs.has_test_script == 'true' }}
        run: npm test

      - name: Skip backend tests
        if: ${{ steps.backend-tests.outputs.has_test_script != 'true' }}
        run: echo "No backend test script found. Skipping backend npm tests."

  # Stage 2: Selenium end-to-end tests
  # This job only starts after both frontend-test and backend-test succeed.
  selenium-test:
    name: Selenium Test
    runs-on: ubuntu-latest
    needs:
      - frontend-test
      - backend-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Selenium test files
        id: selenium-files
        shell: bash
        run: |
          if [ -f tests/selenium.test.js ]; then
            echo "has_selenium_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_selenium_test=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f package-lock.json ]; then
            echo "has_root_lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_root_lockfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js with cache
        if: ${{ steps.selenium-files.outputs.has_root_lockfile == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            package-lock.json

      - name: Setup Node.js
        if: ${{ steps.selenium-files.outputs.has_root_lockfile != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        if: ${{ steps.selenium-files.outputs.has_selenium_test == 'true' }}
        working-directory: backend
        run: npm install

      - name: Start backend server
        if: ${{ steps.selenium-files.outputs.has_selenium_test == 'true' }}
        working-directory: backend
        run: |
          npm start &
          sleep 10

      - name: Install Selenium dependencies
        if: ${{ steps.selenium-files.outputs.has_selenium_test == 'true' }}
        run: npm install

      - name: Run Selenium tests
        if: ${{ steps.selenium-files.outputs.has_selenium_test == 'true' }}
        run: node tests/selenium.test.js

      - name: Skip Selenium tests
        if: ${{ steps.selenium-files.outputs.has_selenium_test != 'true' }}
        run: echo "No tests/selenium.test.js found. Skipping Selenium stage."

  # Stage 3: Docker image build
  # This runs only after selenium-test passes.
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: selenium-test
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t smart-travel-app .

      # Optional: Push image to Docker Hub when credentials are configured in GitHub secrets.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        run: |
          docker tag smart-travel-app $DOCKERHUB_USERNAME/smart-travel-app:latest
          docker push $DOCKERHUB_USERNAME/smart-travel-app:latest

  # Stage 4: Deployment
  # Final job in the pipeline. If any earlier stage fails, this job never runs.
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Deploy application
        run: echo "Deploying Smart Travel App..."
